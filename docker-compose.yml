services:
  # `docker compose up -d` starts only the database (local dev runs the
  # server and web via npm). `docker compose --profile full up --build`
  # additionally builds and runs the whole app on :3001.
  app:
    profiles: ["full"]
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://todo:todo@db:5432/todo
      JWT_SECRET: ${JWT_SECRET:-compose-demo-secret}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: todo
      POSTGRES_PASSWORD: todo
      POSTGRES_DB: todo
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./docker/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U todo -d todo"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  db-data:
